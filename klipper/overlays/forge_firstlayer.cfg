# First-layer / Z-offset helpers for adhesion (Phase 1 acceptance)

[gcode_macro _FORGE_Z]
# POSITIVE raises nozzle; NEGATIVE lowers (more squish).
# Saved shop baseline: operator locked Z = -0.485 mm (more squish than +0.90 trial)
variable_z_adjust: -0.485
gcode:
  {action_respond_info("FORGE_Z ok")}

[gcode_macro FORGE_SET_Z_ADJUST]
gcode:
  {% set Z = params.Z|default(-0.485)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_Z VARIABLE=z_adjust VALUE={Z}
  SET_GCODE_OFFSET Z={Z} MOVE=0
  RESPOND MSG="Z adjust={Z} mm | + raises nozzle | - lowers (more squish). Empty bed = too low → BABY_UP / higher Z."

[gcode_macro FORGE_BABY_DOWN]
# Closer to bed (+squish). Use if lines are round / not stuck.
gcode:
  {% set z = printer["gcode_macro _FORGE_Z"].z_adjust|float - 0.02 %}
  SET_GCODE_VARIABLE MACRO=_FORGE_Z VARIABLE=z_adjust VALUE={z}
  SET_GCODE_OFFSET Z={z} MOVE=1
  RESPOND MSG="BABY DOWN (closer) Z={z}"

[gcode_macro FORGE_BABY_UP]
# Farther from bed. Use if scraping / nothing extrudes / empty sheet.
gcode:
  {% set z = printer["gcode_macro _FORGE_Z"].z_adjust|float + 0.02 %}
  SET_GCODE_VARIABLE MACRO=_FORGE_Z VARIABLE=z_adjust VALUE={z}
  SET_GCODE_OFFSET Z={z} MOVE=1
  RESPOND MSG="BABY UP (higher) Z={z}"

[gcode_macro FORGE_APPLY_Z]
gcode:
  {% set z = printer["gcode_macro _FORGE_Z"].z_adjust|float %}
  SET_GCODE_OFFSET Z={z} MOVE=0
  RESPOND MSG="Applied Z offset {z} mm"

[gcode_macro FORGE_Z_STATUS]
gcode:
  {% set z = printer["gcode_macro _FORGE_Z"].z_adjust %}
  RESPOND MSG="FORGE Z_ADJUST={z} (probe z_offset still in printer.cfg; this is live babystep stack)"
