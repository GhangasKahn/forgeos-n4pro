# Environmental state variables for basement / enclosure awareness.
# Python HomeostasisController is the brain; these macros store operator inputs
# and expose ENV-aware print start/end hooks.

[gcode_macro _FORGE_ENV]
variable_ambient_c: 14.0
variable_rh: 65.0
variable_enclosure: 0
# 0=open 1=door_ajar 2=enclosed
variable_draft: 0.30
variable_bed_soak_min: 5.0
variable_bed_target: 60.0
variable_nozzle_target: 215.0
gcode:
  {action_respond_info("FORGE_ENV ok")}

[gcode_macro FORGE_SET_AMBIENT]
gcode:
  {% set T = params.TEMP|default(14)|float %}
  {% set RH = params.RH|default(65)|float %}
  {% set DRAFT = params.DRAFT|default(0.3)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=ambient_c VALUE={T}
  SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=rh VALUE={RH}
  SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=draft VALUE={DRAFT}
  RESPOND MSG="Ambient set T={T}C RH={RH}% draft={DRAFT}"

[gcode_macro FORGE_SET_ENCLOSURE]
gcode:
  {% set MODE = params.MODE|default("open")|string|lower %}
  {% if MODE == "enclosed" or MODE == "closed" or MODE == "on" %}
    SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=enclosure VALUE=2
    SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=draft VALUE=0.05
    RESPOND MSG="Enclosure=ENCLOSED"
  {% elif MODE == "ajar" or MODE == "vented" %}
    SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=enclosure VALUE=1
    SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=draft VALUE=0.15
    RESPOND MSG="Enclosure=DOOR_AJAR"
  {% else %}
    SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=enclosure VALUE=0
    SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=draft VALUE=0.30
    RESPOND MSG="Enclosure=OPEN"
  {% endif %}

[gcode_macro FORGE_ENV_STATUS]
gcode:
  {% set e = printer["gcode_macro _FORGE_ENV"] %}
  {% set enc = "open" %}
  {% if e.enclosure|int == 2 %}{% set enc = "enclosed" %}{% endif %}
  {% if e.enclosure|int == 1 %}{% set enc = "ajar" %}{% endif %}
  RESPOND MSG="ENV T={e.ambient_c}C RH={e.rh}% enc={enc} draft={e.draft} soak={e.bed_soak_min}m bed={e.bed_target} noz={e.nozzle_target}"

[gcode_macro FORGE_APPLY_ENV_TARGETS]
gcode:
  # Push computed targets into _FORGE_ENV (from host script or manual)
  {% set BED = params.BED|default(60)|float %}
  {% set NOZ = params.NOZ|default(215)|float %}
  {% set SOAK = params.SOAK|default(5)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=bed_target VALUE={BED}
  SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=nozzle_target VALUE={NOZ}
  SET_GCODE_VARIABLE MACRO=_FORGE_ENV VARIABLE=bed_soak_min VALUE={SOAK}
  RESPOND MSG="ENV targets bed={BED} noz={NOZ} soak={SOAK}m"

[gcode_macro FORGE_PRINT_START_ENV]
gcode:
  # Environment-aware start: uses stored targets (defaults = basement-ish)
  # MESH=1 full bed mesh (default). MESH=0 load default profile only (fast iter).
  # SOAK minutes (default from _FORGE_ENV). Use SOAK=1 for quick adaptive coupons.
  {% set e = printer["gcode_macro _FORGE_ENV"] %}
  {% set BED = params.BED|default(e.bed_target)|float %}
  {% set EXTRUDER = params.EXTRUDER|default(e.nozzle_target)|float %}
  {% set SOAK = params.SOAK|default(e.bed_soak_min)|float %}
  {% set MESH = params.MESH|default(1)|int %}
  FORGE_ENV_STATUS
  FORGE_PREFLIGHT
  G90
  M83
  M220 S100
  M221 S100
  FORGE_HEAT_DUAL_BED BED={BED}
  {% if SOAK > 0.05 %}
    FORGE_BED_SOAK MIN={SOAK}
  {% endif %}
  G28
  {% if MESH > 0 %}
    FORGE_MESH_BALANCED
  {% else %}
    BED_MESH_PROFILE LOAD=default
    RESPOND MSG="MESH=0 — loaded profile default (fast path)"
  {% endif %}
  # Live Z babystep stack (negative = more squish / closer to bed)
  FORGE_APPLY_Z
  # Dual-bed adaptive seed: slight outer bias for basement heat loss
  FORGE_ADAPT_DUAL_BED INNER={BED} OUTER={BED + 0.5}
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER}
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER-2} MAXIMUM={EXTRUDER+5}
  # PA + retract profile (anti-ooze) if macros present
  FORGE_SET_PA PA=0.032 SMOOTH=0.03
  FORGE_SET_RETRACT LENGTH=1.15 SPEED=40 WIPE=1.4 ZHOP=0.25
  FORGE_FLAT_SURFACE_MODE ROLE=first
  # Real purge on the front of the bed (not just air prime)
  FORGE_PURGE X=15 Y=12 LEN=110 E=14 Z=0.32
  M106 S0
  RESPOND MSG="FORGE_PRINT_START_ENV ready BED={BED} NOZ={EXTRUDER} SOAK={SOAK}m MESH={MESH} Z applied — purge done"

[gcode_macro FORGE_PRINT_END_ENV]
gcode:
  # Staged cool for cold basement (hold bed briefly)
  {% set e = printer["gcode_macro _FORGE_ENV"] %}
  M104 S0
  M106 S0
  {% if e.ambient_c|float < 18.0 and e.enclosure|int < 2 %}
    RESPOND MSG="Cold open shop — staged bed cool"
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=45
    SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET=45
    G4 P120000
  {% endif %}
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET=0
  BED_MESH_CLEAR
  RESPOND MSG="FORGE_PRINT_END_ENV complete"

# Make default START/END env-aware if slicer calls START_PRINT
[gcode_macro START_PRINT]
gcode:
  FORGE_PRINT_START_ENV BED={params.BED|default(60)|float} EXTRUDER={params.EXTRUDER|default(215)|float}

[gcode_macro END_PRINT]
gcode:
  FORGE_PRINT_END_ENV
