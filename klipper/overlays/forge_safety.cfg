# ForgeOS safety / mode variables (include after base)
# Hard ceilings for exploration — optimizers must not exceed these via gcode.

[gcode_macro _FORGE_STATE]
variable_armed_autotune: 0
variable_material_sku: "protopasta_htpla"
variable_recipe: "balanced"
variable_part_class: "jig"
variable_nozzle_type: "hardened"
variable_nozzle_diameter: 0.4
variable_abrasive_ok: 0
variable_bed_soak_min: 3
gcode:
  {action_respond_info("FORGE_STATE ok")}

[gcode_macro FORGE_ARM_AUTOTUNE]
gcode:
  SET_GCODE_VARIABLE MACRO=_FORGE_STATE VARIABLE=armed_autotune VALUE=1
  RESPOND MSG="ForgeOS autotune ARMED (zero-trust: still clamped by envelopes)"

[gcode_macro FORGE_DISARM]
gcode:
  SET_GCODE_VARIABLE MACRO=_FORGE_STATE VARIABLE=armed_autotune VALUE=0
  RESPOND MSG="ForgeOS DISARMED"

[gcode_macro FORGE_SET_MATERIAL]
gcode:
  {% set sku = params.SKU|default("protopasta_htpla")|string %}
  SET_GCODE_VARIABLE MACRO=_FORGE_STATE VARIABLE=material_sku VALUE='"{sku}"'
  RESPOND MSG="Material SKU={sku}"

[gcode_macro FORGE_SET_NOZZLE]
gcode:
  {% set ntype = params.TYPE|default("hardened")|string %}
  {% set dia = params.DIA|default(0.4)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_STATE VARIABLE=nozzle_type VALUE='"{ntype}"'
  SET_GCODE_VARIABLE MACRO=_FORGE_STATE VARIABLE=nozzle_diameter VALUE={dia}
  RESPOND MSG="Nozzle type={ntype} dia={dia}"

[gcode_macro FORGE_PREFLIGHT]
gcode:
  {% set st = printer["gcode_macro _FORGE_STATE"] %}
  {% if st.material_sku == "protopasta_htpla_cf" %}
    {% if st.nozzle_type != "hardened" and st.nozzle_type != "ruby" %}
      {action_raise_error("PREFLIGHT FAIL: HTPLA-CF requires hardened nozzle")}
    {% endif %}
    {% if st.nozzle_diameter < 0.5 %}
      {action_raise_error("PREFLIGHT FAIL: HTPLA-CF needs nozzle >= 0.5mm")}
    {% endif %}
  {% endif %}
  RESPOND MSG="PREFLIGHT PASS sku={st.material_sku} nozzle={st.nozzle_type}/{st.nozzle_diameter}"
