# Mesh profiles notes for ForgeOS
# Default base config uses 7x7 balanced. For precision fixtures, temporarily set:
#   probe_count: 11, 11
# in printer.cfg or manage via separate include after SAVE_CONFIG-safe workflow.
#
# Mesh quality gate (software): peak-to-peak > 0.8 mm => G2 FAIL / re-level.

[gcode_macro FORGE_MESH_STATUS]
gcode:
  {% if "bed_mesh" in printer %}
    RESPOND MSG="bed_mesh profile active — verify in Mainsail; peak-to-peak logged by ForgeOS journal"
  {% else %}
    RESPOND MSG="bed_mesh not loaded"
  {% endif %}
