# ForgeOS bed mesh — speed tiers without throwing away accuracy
#
# WHY MESH WAS ~20 MIN
#   11×11 points = 121 cells
#   × samples=3  = up to 363 probes
#   × probe speed 6 mm/s + 3 mm retract + retries
#   ≈ 15–25 minutes. That is calibration-grade, not every-print.
#
# MECHANICS (what actually costs time)
#   1) Point count N×N  (dominant)
#   2) samples per point
#   3) probe approach speed + lift/retract distance
#   4) XY travel between points (usually minor if speed≥150)
#   5) tolerance retries (noise → re-probes)
#
# PRECISION MODEL
#   Bicubic + mesh_pps interpolates between probes. On a 225 mm bed,
#   7×7 (spacing ~30 mm) is standard; 5×5 is fine for flat PEX after a
#   good golden profile. 11×11 is for mapping warpage / first-time setup.
#
# POLICY
#   EVERY print  → LOAD saved profile (seconds)  OR  FORGE_MESH_FAST (5×5)
#   Session start / after crash → FORGE_MESH_BALANCED (7×7)
#   Weekly / G2 gate / bed change → FORGE_MESH_PRECISION (9×9)
#   Never default to 11×11×3 for production starts.

[gcode_macro FORGE_MESH_STATUS]
gcode:
  {% if "bed_mesh" in printer %}
    {% set bm = printer.bed_mesh %}
    RESPOND MSG="bed_mesh profile={bm.profile_name} — use FORGE_MESH_FAST|BALANCED|PRECISION|LOAD"
  {% else %}
    RESPOND MSG="bed_mesh not available"
  {% endif %}

[gcode_macro FORGE_MESH_LOAD]
# Instant path — use last SAVE_CONFIG / saved "default" profile
gcode:
  BED_MESH_PROFILE LOAD=default
  RESPOND MSG="MESH LOAD default (0s probe) — re-mesh with FORGE_MESH_BALANCED if first layer looks tilted"

[gcode_macro FORGE_MESH_FAST]
# ~30–90 s after probe speed upgrade. Production every-print if not loading profile.
# PROBE_COUNT overrides printer.cfg 11×11.
gcode:
  {% set PX = params.X|default(5)|int %}
  {% set PY = params.Y|default(5)|int %}
  RESPOND MSG="MESH FAST {PX}x{PY} — max speed, bicubic fills gaps"
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE PROBE_COUNT={PX},{PY} SPEED=200 HORIZONTAL_MOVE_Z=3
  RESPOND MSG="MESH FAST done — SAVE_CONFIG if this should be new default profile"

[gcode_macro FORGE_MESH_BALANCED]
# ~1.5–4 min. Shop session standard (was accidentally full 11×11 calibrate).
gcode:
  {% set PX = params.X|default(7)|int %}
  {% set PY = params.Y|default(7)|int %}
  RESPOND MSG="MESH BALANCED {PX}x{PY}"
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE PROBE_COUNT={PX},{PY} SPEED=180 HORIZONTAL_MOVE_Z=3
  RESPOND MSG="MESH BALANCED done"

[gcode_macro FORGE_MESH_PRECISION]
# ~4–10 min. Fixtures / G2 / after PEI change. Not for every coupon.
gcode:
  {% set PX = params.X|default(9)|int %}
  {% set PY = params.Y|default(9)|int %}
  RESPOND MSG="MESH PRECISION {PX}x{PY}"
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE PROBE_COUNT={PX},{PY} SPEED=150 HORIZONTAL_MOVE_Z=3.5
  RESPOND MSG="MESH PRECISION done — consider BED_MESH_PROFILE SAVE=default + SAVE_CONFIG"

[gcode_macro FORGE_MESH_SMART]
# MESH=0 load | MESH=1 fast 5×5 | MESH=2 balanced 7×7 | MESH=3 precision 9×9
gcode:
  {% set MODE = params.MODE|default(0)|int %}
  {% if MODE <= 0 %}
    FORGE_MESH_LOAD
  {% elif MODE == 1 %}
    FORGE_MESH_FAST
  {% elif MODE == 2 %}
    FORGE_MESH_BALANCED
  {% else %}
    FORGE_MESH_PRECISION
  {% endif %}
