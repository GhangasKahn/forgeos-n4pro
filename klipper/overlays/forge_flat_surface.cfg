# Machine-flat solid surface motion (ZERO IRONING)
# Volume balance lives in gcode generators; these macros set Klipper dynamics.

[gcode_macro _FORGE_FLAT]
variable_line_w: 0.44
variable_flow: 1.00
variable_pa: 0.032
variable_pa_smooth: 0.03
variable_q_max: 12.0
gcode:
  {action_respond_info("FORGE_FLAT ok")}

[gcode_macro FORGE_FLAT_SURFACE_MODE]
# ROLE=first|solid|top
gcode:
  {% set ROLE = params.ROLE|default("solid")|string|lower %}
  {% set LW = printer["gcode_macro _FORGE_FLAT"].line_w|float %}
  {% set FLOW = printer["gcode_macro _FORGE_FLAT"].flow|float %}
  {% set PA = printer["gcode_macro _FORGE_FLAT"].pa|float %}
  {% set SM = printer["gcode_macro _FORGE_FLAT"].pa_smooth|float %}
  {% set QMAX = printer["gcode_macro _FORGE_FLAT"].q_max|float %}
  {% if ROLE == "first" or ROLE == "first_layer" %}
    {% set H = 0.28 %}
    {% set V = 30.0 %}
    {% set ACC = 2500 %}
    {% set SCV = 3.0 %}
    {% set FAN = 0 %}
  {% elif ROLE == "top" or ROLE == "top_solid" %}
    {% set H = 0.20 %}
    {% set V = 80.0 %}
    {% set ACC = 3500 %}
    {% set SCV = 3.0 %}
    {% set FAN = 60 %}
  {% else %}
    {% set H = 0.20 %}
    {% set V = 120.0 %}
    {% set ACC = 5000 %}
    {% set SCV = 5.0 %}
    {% set FAN = 40 %}
  {% endif %}
  {# Q clamp: v_max = 0.92 * Qmax / (w*h*flow) #}
  {% set DEN = LW * H * FLOW %}
  {% if DEN > 0.000001 %}
    {% set VMAX = 0.92 * QMAX / DEN %}
    {% if V > VMAX %}
      {% set V = VMAX %}
    {% endif %}
  {% endif %}
  SET_VELOCITY_LIMIT VELOCITY={V * 1.15} ACCEL={ACC} SQUARE_CORNER_VELOCITY={SCV}
  SET_PRESSURE_ADVANCE ADVANCE={PA} SMOOTH_TIME={SM}
  M221 S{ (FLOW * 100)|int }
  M106 S{ (FAN * 255 / 100)|int }
  RESPOND MSG="FORGE_FLAT ROLE={ROLE} v≈{V|round(1)}mm/s accel={ACC} scv={SCV} w={LW} f={FLOW} PA={PA} (no ironing)"

[gcode_macro FORGE_FLAT_SET]
gcode:
  {% if params.LINE_W is defined %}
    SET_GCODE_VARIABLE MACRO=_FORGE_FLAT VARIABLE=line_w VALUE={params.LINE_W|float}
  {% endif %}
  {% if params.FLOW is defined %}
    SET_GCODE_VARIABLE MACRO=_FORGE_FLAT VARIABLE=flow VALUE={params.FLOW|float}
  {% endif %}
  {% if params.PA is defined %}
    SET_GCODE_VARIABLE MACRO=_FORGE_FLAT VARIABLE=pa VALUE={params.PA|float}
  {% endif %}
  {% if params.Q_MAX is defined %}
    SET_GCODE_VARIABLE MACRO=_FORGE_FLAT VARIABLE=q_max VALUE={params.Q_MAX|float}
  {% endif %}
  RESPOND MSG="FORGE_FLAT params line_w={printer["gcode_macro _FORGE_FLAT"].line_w} flow={printer["gcode_macro _FORGE_FLAT"].flow} pa={printer["gcode_macro _FORGE_FLAT"].pa} q_max={printer["gcode_macro _FORGE_FLAT"].q_max}"
