# ForgeOS operator macros — dual-bed soak, mesh, print start, cal hooks

[gcode_macro FORGE_HEAT_DUAL_BED]
gcode:
  {% set BED = params.BED|default(60)|float %}
  RESPOND MSG="Heating dual bed to {BED}C"
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED}
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET={BED}
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED-2} MAXIMUM={BED+4}
  # heater_generic requires full object name for SENSOR=
  TEMPERATURE_WAIT SENSOR="heater_generic heater_bed_outer" MINIMUM={BED-3} MAXIMUM={BED+5}

[gcode_macro FORGE_BED_SOAK]
gcode:
  {% set MIN = params.MIN|default(3)|float %}
  RESPOND MSG="Bed soak {MIN} minutes (thermal equalization)"
  G4 P{MIN * 60000}

# Mesh macros live in forge_mesh.cfg (FAST/BALANCED/PRECISION/LOAD/SMART).
# Do not redefine here — would wipe PROBE_COUNT speed tiers.

[gcode_macro FORGE_PRINT_START]
gcode:
  {% set BED = params.BED|default(60)|float %}
  {% set EXTRUDER = params.EXTRUDER|default(215)|float %}
  {% set SOAK = params.SOAK|default(3)|float %}
  FORGE_PREFLIGHT
  G90
  M83
  FORGE_HEAT_DUAL_BED BED={BED}
  FORGE_BED_SOAK MIN={SOAK}
  G28
  FORGE_MESH_BALANCED
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER}
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER-2} MAXIMUM={EXTRUDER+5}
  RESPOND MSG="FORGE_PRINT_START ready BED={BED} EXTRUDER={EXTRUDER}"

[gcode_macro FORGE_PRINT_END]
gcode:
  M104 S0
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET=0
  M106 S0
  BED_MESH_CLEAR
  RESPOND MSG="FORGE_PRINT_END complete"

[gcode_macro FORGE_PID_ALL]
gcode:
  RESPOND MSG="PID tune nozzle @ 220"
  PID_CALIBRATE HEATER=extruder TARGET=220
  RESPOND MSG="PID tune inner bed @ 60"
  PID_CALIBRATE HEATER=heater_bed TARGET=60
  RESPOND MSG="PID tune outer bed @ 60"
  PID_CALIBRATE HEATER=heater_bed_outer TARGET=60
  SAVE_CONFIG

[gcode_macro FORGE_SHAPER_CAL]
gcode:
  RESPOND MSG="Run resonance test only if ADXL/Beacon/Eddy configured"
  # Uncomment after sensor install:
  # SHAPER_CALIBRATE
  # SAVE_CONFIG

[gcode_macro FORGE_PROBE_CAL]
gcode:
  G28
  PROBE_CALIBRATE
  RESPOND MSG="Accept Z offset then SAVE_CONFIG"

[gcode_macro FORGE_FLOW_CAL]
gcode:
  RESPOND MSG="Print single-wall cube and set flow via slicer/forge journal"

[gcode_macro FORGE_PA_CAL]
gcode:
  RESPOND MSG="Print PA pattern; set pressure_advance via SET_PRESSURE_ADVANCE"

[gcode_macro FORGE_PRINT_COUPON]
gcode:
  RESPOND MSG="Slice and print 100mm bar + 20mm cube coupon for G3/G4 gates"

# START_PRINT / END_PRINT live in forge_environment.cfg (env-aware).