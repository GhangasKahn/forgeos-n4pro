# ForgeOS operator macros — dual-bed soak, mesh, print start, calibration suite
# Aligned with OpenNept4une calibration order + Neptune 4 Pro dual-bed PID.

[gcode_macro FORGE_HEAT_DUAL_BED]
gcode:
  {% set BED = params.BED|default(60)|float %}
  RESPOND MSG="Heating dual bed to {BED}C"
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED}
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET={BED}
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED-2} MAXIMUM={BED+4}
  # heater_generic requires full object name for SENSOR=
  TEMPERATURE_WAIT SENSOR="heater_generic heater_bed_outer" MINIMUM={BED-3} MAXIMUM={BED+5}

[gcode_macro FORGE_BED_SOAK]
gcode:
  {% set MIN = params.MIN|default(3)|float %}
  RESPOND MSG="Bed soak {MIN} minutes (thermal equalization)"
  G4 P{MIN * 60000}

# Mesh macros live in forge_mesh.cfg (FAST/BALANCED/PRECISION/LOAD/SMART).

[gcode_macro FORGE_PRINT_START]
gcode:
  {% set BED = params.BED|default(60)|float %}
  {% set EXTRUDER = params.EXTRUDER|default(215)|float %}
  {% set SOAK = params.SOAK|default(3)|float %}
  FORGE_PREFLIGHT
  G90
  M83
  FORGE_HEAT_DUAL_BED BED={BED}
  FORGE_BED_SOAK MIN={SOAK}
  G28
  FORGE_MESH_BALANCED
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER}
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER-2} MAXIMUM={EXTRUDER+5}
  RESPOND MSG="FORGE_PRINT_START ready BED={BED} EXTRUDER={EXTRUDER}"

[gcode_macro FORGE_PRINT_END]
gcode:
  M104 S0
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET=0
  M106 S0
  BED_MESH_CLEAR
  RESPOND MSG="FORGE_PRINT_END complete"

# ---------------------------------------------------------------------------
# Calibration — one-time machine + filament (OpenNeptune-compatible)
# ---------------------------------------------------------------------------

[gcode_macro FORGE_CAL_FULL]
description: Announce full ForgeOS calibration campaign (drive from host runner)
gcode:
  {% set SUITE = params.SUITE|default("full")|string %}
  RESPOND MSG="FORGE_CAL_FULL suite={SUITE} — run: python3 -m forgeos.calibration dry-run --suite {SUITE}"
  RESPOND MSG="Order: preflight→screws→probe_z→RD→PID→shaper→mesh→FL→flow→PA→retract→coupon→measure→promote"
  RESPOND MSG="Fine-tune: temp→PA_fine→flow_fine→flat→G4×3→G5 speed→anneal(G6)"

[gcode_macro FORGE_BED_SCREWS_TUNE]
description: OpenNeptune-style bed screw tilt (retry until deltas small)
gcode:
  RESPOND MSG="Bed screws: do NOT over-compress springs (center-high mesh). After adjust → FORGE_PROBE_CAL"
  {% if printer.configfile.settings.screws_tilt_adjust is defined %}
  SCREWS_TILT_CALCULATE
  {% else %}
  RESPOND MSG="screws_tilt_adjust not in config — use OpenNeptune BED_LEVEL_SCREWS_TUNE or manual paper"
  {% endif %}

[gcode_macro FORGE_PID_ALL]
description: PID nozzle + N4 Pro dual bed (inner + outer) then SAVE_CONFIG
gcode:
  {% set NOZ = params.NOZ|default(220)|float %}
  {% set BED = params.BED|default(60)|float %}
  RESPOND MSG="PID tune nozzle @{NOZ}"
  PID_CALIBRATE HEATER=extruder TARGET={NOZ}
  RESPOND MSG="PID tune inner bed @{BED}"
  PID_CALIBRATE HEATER=heater_bed TARGET={BED}
  RESPOND MSG="PID tune outer bed @{BED} (N4 Pro)"
  PID_CALIBRATE HEATER=heater_bed_outer TARGET={BED}
  SAVE_CONFIG

[gcode_macro FORGE_SHAPER_CAL]
description: Input shaper if ADXL/Beacon configured
gcode:
  {% set FORCE = params.FORCE|default(0)|int %}
  {% if printer.configfile.settings.resonance_tester is defined or FORCE == 1 %}
  RESPOND MSG="Running SHAPER_CALIBRATE"
  SHAPER_CALIBRATE
  SAVE_CONFIG
  {% else %}
  RESPOND MSG="No resonance_tester — skip or install ADXL then FORGE_SHAPER_CAL FORCE=1"
  {% endif %}

[gcode_macro FORGE_PROBE_CAL]
description: Cold probe Z paper test (OpenNeptune CALIBRATE_PROBE_Z_OFFSET)
gcode:
  G28
  PROBE_CALIBRATE
  RESPOND MSG="Accept Z offset then SAVE_CONFIG. Re-run after any bed screw change."

[gcode_macro FORGE_EXTRUDE_CAL]
description: Slow 100 mm extrusion for rotation_distance measurement
gcode:
  {% set E = params.E|default(100)|float %}
  {% set F = params.F|default(60)|float %}
  {% set T = params.TEMP|default(214)|float %}
  M83
  G92 E0
  M104 S{T}
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={T-2} MAXIMUM={T+5}
  RESPOND MSG="Mark filament 120mm above entry; extruding {E}mm @ {F}mm/min"
  G1 E{E} F{F}
  M104 S0
  RESPOND MSG="actual=120-leftover; new_rd=old_rd*(actual/{E}) — python3 -m forgeos.calibration compute-rd"

[gcode_macro FORGE_FLOW_CAL]
description: Point operator at host-generated single-wall flow shell
gcode:
  RESPOND MSG="Print artifacts/calibration/flow_shell.gcode (or: python3 -m forgeos.calibration patterns)"
  RESPOND MSG="Measure wall → FORGE_COMPUTE_FLOW MEASURED=x.xx LINE_W=0.44"
  RESPOND MSG="Order rule: rotation_distance BEFORE flow BEFORE pressure advance"

[gcode_macro FORGE_COMPUTE_FLOW]
description: Console helper — prints new flow from measured wall thickness
gcode:
  {% set M = params.MEASURED|float %}
  {% set W = params.LINE_W|default(0.44)|float %}
  {% set P = params.PERIMS|default(1)|int %}
  {% set CUR = params.CURRENT|default(1.0)|float %}
  {% set EXPECTED = W * P %}
  {% set NEW = CUR * EXPECTED / M %}
  RESPOND MSG="flow: measured={M} expected={EXPECTED} current={CUR} → new_flow={NEW|round(4)}"
  RESPOND MSG="Apply: FORGE_SET_FLOW FLOW={(NEW*100)|round(0)}  (and update slicer filament multiplier)"

[gcode_macro FORGE_PA_CAL]
description: Prep printer for PA TUNING_TOWER (print host pa_tower.gcode)
gcode:
  RESPOND MSG="Print artifacts/calibration/pa_tower.gcode — DD FACTOR=0.005"
  RESPOND MSG="Before tower: SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY=1 ACCEL=500"
  RESPOND MSG="Measure height of best corners → FORGE_COMPUTE_PA HEIGHT=h"
  SET_PRESSURE_ADVANCE ADVANCE=0
  SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY=1 ACCEL=500

[gcode_macro FORGE_COMPUTE_PA]
description: Console helper — PA = START + HEIGHT * FACTOR
gcode:
  {% set H = params.HEIGHT|float %}
  {% set S = params.START|default(0)|float %}
  {% set F = params.FACTOR|default(0.005)|float %}
  {% set PA = S + H * F %}
  RESPOND MSG="pressure_advance = {S} + {H}*{F} = {PA|round(5)}"
  RESPOND MSG="Apply: FORGE_SET_PA PA={PA|round(5)} SMOOTH=0.03  (also filament start gcode)"

[gcode_macro FORGE_PA_FINE]
description: Narrow PA band around seed for god-tier corners
gcode:
  {% set SEED = params.SEED|default(0.030)|float %}
  {% set BAND = params.BAND|default(0.010)|float %}
  {% set START = SEED - BAND %}
  {% if START < 0 %}{% set START = 0 %}{% endif %}
  RESPOND MSG="PA fine: print pa_fine.gcode around seed={SEED} band=±{BAND}"
  RESPOND MSG="Or TUNING_TOWER START={START} FACTOR=0.002 then FORGE_COMPUTE_PA"
  SET_PRESSURE_ADVANCE ADVANCE=0
  SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY=1 ACCEL=500

[gcode_macro FORGE_FLOW_FINE]
gcode:
  RESPOND MSG="Re-print flow shell after PA/temp settle; FORGE_COMPUTE_FLOW MEASURED=..."

[gcode_macro FORGE_FIRST_LAYER_CAL]
description: Machine-flat first-layer patch instructions
gcode:
  RESPOND MSG="Print artifacts/calibration/first_layer_patch.gcode on clean PEX"
  RESPOND MSG="Baby-step: FORGE_BABY_UP / FORGE_BABY_DOWN — then Z_OFFSET_APPLY_PROBE + SAVE_CONFIG"
  RESPOND MSG="Machine-flat rule: spacing=line_width, flow≈1.0, ZERO ironing"

[gcode_macro FORGE_RETRACT_CAL]
description: Retract/wipe/zhop seed for N4 Pro geared + Brozzl + HTPLA
gcode:
  {% set L = params.LENGTH|default(1.20)|float %}
  {% set S = params.SPEED|default(40)|float %}
  {% set W = params.WIPE|default(1.4)|float %}
  {% set Z = params.ZHOP|default(0.25)|float %}
  FORGE_SET_RETRACT LENGTH={L} SPEED={S} WIPE={W} ZHOP={Z}
  RESPOND MSG="Tune with Orca stringing tower (firmware retract OFF while tuning)"
  RESPOND MSG="OpenNeptune z-hop band 0.3–0.6; shop seed {Z}mm — raise if scars, lower if whiskers"

[gcode_macro FORGE_TEMP_TOWER]
gcode:
  RESPOND MSG="Use Orca temp tower; HTPLA+plated copper often wants slight cool bias vs brass"
  RESPOND MSG="Apply winner: FORGE_APPLY_ENV_TARGETS with NOZ=... or update material pack"

[gcode_macro FORGE_PRINT_COUPON]
description: Point to G3 dimensional bar gcode
gcode:
  RESPOND MSG="Print G3 bar: artifacts/gcodes/forgeos_g3_*.gcode"
  RESPOND MSG="Generate: python3 scripts/generate_g3_bar_gcode.py --use-stack"
  RESPOND MSG="Measure X→ scripts/import_caliper_csv.py ; gate |err|≤0.20mm/100mm"

[gcode_macro FORGE_APPLY_CAL_RESULT]
description: Apply promoted PA/flow/Z/retract knobs after campaign
gcode:
  {% set PA = params.PA|default(0.030)|float %}
  {% set FLOW = params.FLOW|default(100)|float %}
  {% set Z = params.Z|default(-0.480)|float %}
  {% set RETRACT = params.RETRACT|default(1.20)|float %}
  {% set WIPE = params.WIPE|default(1.4)|float %}
  {% set ZHOP = params.ZHOP|default(0.25)|float %}
  {% set SMOOTH = params.SMOOTH|default(0.03)|float %}
  FORGE_SET_Z_ADJUST Z={Z}
  FORGE_SET_PA PA={PA} SMOOTH={SMOOTH}
  FORGE_SET_FLOW FLOW={FLOW}
  FORGE_SET_RETRACT LENGTH={RETRACT} SPEED=40 WIPE={WIPE} ZHOP={ZHOP}
  RESPOND MSG="CAL RESULT applied Z={Z} PA={PA} FLOW={FLOW}% RETRACT={RETRACT}"

# START_PRINT / END_PRINT live in forge_environment.cfg (env-aware).
