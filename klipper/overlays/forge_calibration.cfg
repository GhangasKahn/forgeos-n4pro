# ForgeOS calibration macros — Neptune 4 Pro (OpenNeptune-aligned)
#
# Maps to OpenNeptune3D wiki macros where applicable:
#   PID_TUNE_* → FORGE_PID_*
#   CALIBRATE_PROBE_Z_OFFSET → FORGE_PROBE_CAL
#   BED_LEVEL_SCREWS_TUNE → FORGE_SCREWS_TILT
#   AXIS_TWIST_COMP_TUNE → FORGE_AXIS_TWIST
#   SHAPER_CALIBRATE → FORGE_SHAPER_CAL

[gcode_macro FORGE_PID_EXTRUDER]
gcode:
  RESPOND MSG="PID tune extruder @ 220C (OpenNeptune: PID_TUNE_EXTRUDER)"
  PID_CALIBRATE HEATER=extruder TARGET=220
  RESPOND MSG="Accept PID values then SAVE_CONFIG"

[gcode_macro FORGE_PID_BED_INNER]
gcode:
  {% set T = params.TARGET|default(65)|float %}
  RESPOND MSG="PID tune inner bed @ {T}C"
  PID_CALIBRATE HEATER=heater_bed TARGET={T}
  RESPOND MSG="Accept PID values then SAVE_CONFIG"

[gcode_macro FORGE_PID_BED_OUTER]
gcode:
  {% set T = params.TARGET|default(65)|float %}
  RESPOND MSG="PID tune outer bed @ {T}C (N4 Pro dual zone)"
  PID_CALIBRATE HEATER=heater_bed_outer TARGET={T}
  RESPOND MSG="Accept PID values then SAVE_CONFIG"

[gcode_macro FORGE_SCREWS_TILT]
# OpenNeptune: BED_LEVEL_SCREWS_TUNE — run FORGE_PROBE_CAL after adjusting screws
gcode:
  {% set T = params.BED|default(60)|float %}
  RESPOND MSG="Bed screws tilt @ {T}C — adjust corners per console, then FORGE_PROBE_CAL"
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={T}
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET={T}
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={T-2} MAXIMUM={T+4}
  TEMPERATURE_WAIT SENSOR="heater_generic heater_bed_outer" MINIMUM={T-3} MAXIMUM={T+5}
  G28
  BED_MESH_CLEAR
  BED_LEVEL_SCREWS_TUNE

[gcode_macro FORGE_AXIS_TWIST]
# OpenNeptune: AXIS_TWIST_COMP_TUNE
gcode:
  RESPOND MSG="Axis twist compensation — follow console prompts"
  G28
  AXIS_TWIST_COMPENSATION_CALIBRATE
  RESPOND MSG="SAVE_CONFIG after accepting compensation"

[gcode_macro FORGE_ROTATION_DISTANCE]
# Operator: mark 120mm filament, run this, measure remaining mark
gcode:
  {% set MM = params.MM|default(100)|float %}
  RESPOND MSG="Extruding {MM}mm — mark filament before/after to calc rotation_distance"
  G28
  M83
  G1 E{MM} F60
  RESPOND MSG="Measure actual extrusion; update rotation_distance in extruder section"

[gcode_macro FORGE_TEMP_TOWER]
gcode:
  {% set START = params.START|default(200)|float %}
  {% set STEP = params.STEP|default(5)|float %}
  {% set HEIGHT = params.HEIGHT|default(5)|float %}
  RESPOND MSG="Temp tower START={START} STEP={STEP} HEIGHT={HEIGHT} — slice tower model then print"
  TUNING_TOWER COMMAND=SET_HEATER_TEMPERATURE HEATER=extruder PARAMETER=TARGET START={START} STEP_DELTA={STEP} STEP_HEIGHT={HEIGHT}

[gcode_macro FORGE_RETRACT_TOWER]
gcode:
  RESPOND MSG="Slice retraction tower in Orca; use firmware retraction from forge_extrusion.cfg"

[gcode_macro FORGE_FIRST_LAYER_TEST]
gcode:
  {% set BED = params.BED|default(65)|float %}
  {% set NOZ = params.NOZ|default(215)|float %}
  RESPOND MSG="First-layer panel — generate via scripts/run_calibration_suite.py --gcode first_layer"
  FORGE_HEAT_DUAL_BED BED={BED}
  FORGE_BED_SOAK MIN=4
  G28
  FORGE_MESH_FAST
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={NOZ}
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={NOZ-2} MAXIMUM={NOZ+5}
  FORGE_APPLY_Z
  RESPOND MSG="Print first-layer panel G-code; tune FORGE_BABY_UP/DOWN"

[gcode_macro FORGE_FAN_TUNE]
gcode:
  RESPOND MSG="Bridge test — vary fan in slicer 0-100% per layer block"

[gcode_macro FORGE_SPEED_STEP]
gcode:
  {% set ACCEL = params.ACCEL|default(3000)|float %}
  RESPOND MSG="Speed step accel={ACCEL} — requires input shaper for safe high speed"
  SET_VELOCITY_LIMIT ACCEL={ACCEL} SQUARE_CORNER_VELOCITY=5

[gcode_macro FORGE_CAL_STATUS]
gcode:
  RESPOND MSG="ForgeOS calibration suite — see docs/CALIBRATION_SUITE.md"
  RESPOND MSG="One-time: FORGE_PID_ALL, FORGE_PROBE_CAL, FORGE_SCREWS_TILT, FORGE_MESH_PRECISION"
  RESPOND MSG="Fine-tune: FORGE_PA_CAL, FORGE_FLOW_CAL, FORGE_SET_Z_ADJUST"
  RESPOND MSG="Gates: print 100mm bar x3 for G3/G4"
