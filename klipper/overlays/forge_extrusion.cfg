# Extrusion / retract / wipe helpers — anti-ooze for Protopasta + Brozzl

[gcode_macro _FORGE_RETRACT]
variable_length: 1.15
variable_speed: 40.0
variable_unretract_speed: 30.0
variable_wipe: 1.4
variable_zhop: 0.25
variable_pa: 0.032
variable_pa_smooth: 0.03
gcode:
  {action_respond_info("FORGE_RETRACT ok")}

[gcode_macro FORGE_SET_RETRACT]
gcode:
  {% set L = params.LENGTH|default(1.15)|float %}
  {% set S = params.SPEED|default(40)|float %}
  {% set W = params.WIPE|default(1.4)|float %}
  {% set Z = params.ZHOP|default(0.25)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_RETRACT VARIABLE=length VALUE={L}
  SET_GCODE_VARIABLE MACRO=_FORGE_RETRACT VARIABLE=speed VALUE={S}
  SET_GCODE_VARIABLE MACRO=_FORGE_RETRACT VARIABLE=wipe VALUE={W}
  SET_GCODE_VARIABLE MACRO=_FORGE_RETRACT VARIABLE=zhop VALUE={Z}
  RESPOND MSG="Retract L={L}mm S={S}mm/s wipe={W}mm zhop={Z}mm"

[gcode_macro FORGE_SET_PA]
gcode:
  {% set PA = params.PA|default(0.032)|float %}
  {% set SM = params.SMOOTH|default(0.03)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_RETRACT VARIABLE=pa VALUE={PA}
  SET_GCODE_VARIABLE MACRO=_FORGE_RETRACT VARIABLE=pa_smooth VALUE={SM}
  SET_PRESSURE_ADVANCE ADVANCE={PA} SMOOTH_TIME={SM}
  RESPOND MSG="pressure_advance={PA} smooth={SM}"

[gcode_macro FORGE_SET_FLOW]
gcode:
  {% set FLOW = params.FLOW|default(100)|float %}
  M221 S{FLOW}
  RESPOND MSG="flow={FLOW}%"

[gcode_macro FORGE_RETRACT]
# Simple in-place retract + hop (no wipe — wipe needs XY path from slicer/gcode gen)
gcode:
  {% set r = printer["gcode_macro _FORGE_RETRACT"] %}
  {% set L = r.length|float %}
  {% set S = r.speed|float * 60 %}
  {% set Z = r.zhop|float %}
  G91
  G1 E-{L} F{S}
  G1 Z{Z} F600
  G90
  RESPOND MSG="RETRACT {L}mm + hop {Z}"

[gcode_macro FORGE_UNRETRACT]
gcode:
  {% set r = printer["gcode_macro _FORGE_RETRACT"] %}
  {% set L = r.length|float %}
  {% set S = r.unretract_speed|float * 60 %}
  {% set Z = r.zhop|float %}
  G91
  G1 Z-{Z} F600
  G1 E{L} F{S}
  G90

[gcode_macro FORGE_TIP_CLEAN]
# After prime / before long travel: suck back so no hanging whisker
gcode:
  {% set r = printer["gcode_macro _FORGE_RETRACT"] %}
  {% set L = r.length|float %}
  {% set S = r.speed|float * 60 %}
  G91
  G1 E-{L} F{S}
  G90
  RESPOND MSG="TIP_CLEAN retract {L}mm"

[gcode_macro FORGE_PURGE]
# Real bed purge line — primes melt so first layer is not starved / ribbed from cold tip
# Params: X Y LEN (line length) E (filament mm) Z (height)
gcode:
  {% set X = params.X|default(15)|float %}
  {% set Y = params.Y|default(15)|float %}
  {% set LEN = params.LEN|default(100)|float %}
  {% set E = params.E|default(12)|float %}
  {% set Z = params.Z|default(0.30)|float %}
  {% set r = printer["gcode_macro _FORGE_RETRACT"] %}
  {% set RL = r.length|float %}
  {% set RS = r.speed|float * 60 %}
  RESPOND MSG="FORGE_PURGE start X={X} Y={Y} LEN={LEN} E={E}"
  G90
  M83
  G92 E0
  ; move in high, drop to purge height
  G0 Z5 F600
  G0 X{X} Y{Y} F9000
  G0 Z{Z} F600
  ; unretract if tip was cleaned
  G1 E{RL} F{RS}
  G92 E0
  ; slow fat purge line
  G1 X{X + LEN} Y{Y} E{E} F600
  ; second reverse line for extra prime
  G1 X{X} Y{Y + 0.6} E{E * 0.85} F600
  ; wipe + retract so no whisker into the part
  G1 X{X + 8} Y{Y + 0.6} E-0.15 F1800
  G1 E-{RL} F{RS}
  G0 Z{Z + 0.4} F600
  G92 E0
  RESPOND MSG="FORGE_PURGE done — nozzle primed"

[gcode_macro FORGE_PURGE_BLOB]
# Hopeless tip clean: extrude a blob then wipe (use if filament hang is bad)
gcode:
  {% set X = params.X|default(20)|float %}
  {% set Y = params.Y|default(20)|float %}
  G90
  M83
  G0 Z5 F600
  G0 X{X} Y{Y} F9000
  G0 Z0.35 F600
  G92 E0
  G1 E8 F200
  G1 E-1.2 F2400
  G0 Z2 F600
  G0 X{X + 15} Y{Y} F3000
  G92 E0
  RESPOND MSG="FORGE_PURGE_BLOB done"
