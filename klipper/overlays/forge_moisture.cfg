# Moisture soft-sensor operator hooks (Python guardian applies real logic).
# These macros are manual overrides / acknowledgements.

[gcode_macro FORGE_MOISTURE_STATUS]
gcode:
  RESPOND MSG="Moisture soft-sensor runs in ForgeOS guardian (temp droop + heater power). Not absolute RH%."

[gcode_macro FORGE_MOISTURE_SAFE_MODE]
gcode:
  # Conservative manual reaction if print looks wet (bubbles/hiss/weak walls)
  {% set T = params.TEMP|default(220)|float %}
  {% set FLOW = params.FLOW|default(100)|float %}
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={T}
  M221 S{FLOW}
  SET_VELOCITY_LIMIT VELOCITY=180
  RESPOND MSG="MOISTURE_SAFE_MODE temp={T} flow={FLOW}% velocity cap=180 — dry spool when able"
