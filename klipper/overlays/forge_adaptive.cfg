# Zero-vision adaptive helpers — dual bed / nozzle / process brain targets
# Live brain runs on host: python3 -m forgeos.adaptive.service
# These macros let gcode or the brain apply coordinated set-points.

[gcode_macro _FORGE_ADAPT]
variable_bed_base: 65.0
variable_bed_inner: 65.0
variable_bed_outer: 66.0
variable_noz: 214.0
variable_flow_pct: 100.0
variable_speed_pct: 100.0
variable_pa: 0.032
gcode:
  {action_respond_info("FORGE_ADAPT ok")}

[gcode_macro FORGE_ADAPT_DUAL_BED]
# INNER / OUTER absolute targets (C). Independent zones for uniformity.
gcode:
  {% set INNER = params.INNER|default(65)|float %}
  {% set OUTER = params.OUTER|default(INNER)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_ADAPT VARIABLE=bed_inner VALUE={INNER}
  SET_GCODE_VARIABLE MACRO=_FORGE_ADAPT VARIABLE=bed_outer VALUE={OUTER}
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={INNER}
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET={OUTER}
  RESPOND MSG="ADAPT dual-bed inner={INNER}C outer={OUTER}C (zero-vision)"

[gcode_macro FORGE_ADAPT_NOZZLE]
gcode:
  {% set T = params.T|default(214)|float %}
  SET_GCODE_VARIABLE MACRO=_FORGE_ADAPT VARIABLE=noz VALUE={T}
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={T}
  RESPOND MSG="ADAPT nozzle={T}C"

[gcode_macro FORGE_ADAPT_PROCESS]
# One-shot push of brain set-points: BED_I BED_O NOZ FLOW SPEED PA
gcode:
  {% set BI = params.BED_I|default(65)|float %}
  {% set BO = params.BED_O|default(BI)|float %}
  {% set NOZ = params.NOZ|default(214)|float %}
  {% set FLOW = params.FLOW|default(100)|float %}
  {% set SPEED = params.SPEED|default(100)|float %}
  {% set PA = params.PA|default(0.032)|float %}
  FORGE_ADAPT_DUAL_BED INNER={BI} OUTER={BO}
  FORGE_ADAPT_NOZZLE T={NOZ}
  M221 S{FLOW|int}
  M220 S{SPEED|int}
  SET_PRESSURE_ADVANCE ADVANCE={PA} SMOOTH_TIME=0.03
  SET_GCODE_VARIABLE MACRO=_FORGE_ADAPT VARIABLE=flow_pct VALUE={FLOW}
  SET_GCODE_VARIABLE MACRO=_FORGE_ADAPT VARIABLE=speed_pct VALUE={SPEED}
  SET_GCODE_VARIABLE MACRO=_FORGE_ADAPT VARIABLE=pa VALUE={PA}
  RESPOND MSG="ADAPT process bed={BI}/{BO} noz={NOZ} flow={FLOW}% speed={SPEED}% PA={PA}"

[gcode_macro FORGE_ADAPT_STATUS]
gcode:
  {% set a = printer["gcode_macro _FORGE_ADAPT"] %}
  {% set bi = printer.heater_bed.temperature %}
  {% set bo = printer["heater_generic heater_bed_outer"].temperature %}
  {% set noz = printer.extruder.temperature %}
  RESPOND MSG="ADAPT live bedI={bi|round(1)}/{a.bed_inner} bedO={bo|round(1)}/{a.bed_outer} noz={noz|round(1)}/{a.noz} flow={a.flow_pct}% spd={a.speed_pct}% PA={a.pa}"
