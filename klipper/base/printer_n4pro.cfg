# =============================================================================
# ForgeOS — Neptune 4 Pro hardware truth (from live machine inventory)
# MCU: ZNP-K1 / STM32F401 over /dev/ttyS0 @ 250000
# Dual bed zones: heater_bed + heater_bed_outer
# DO NOT paste marketing limits here. Motion ceilings live in forge_safety.cfg
# =============================================================================

[mcu]
serial: /dev/ttyS0
baud: 250000
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 5000
max_z_velocity: 10
max_z_accel: 150
square_corner_velocity: 5.0
minimum_cruise_ratio: 0.0

[stepper_x]
step_pin: PC14
dir_pin: PC13
enable_pin: !PC15
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: PC0
position_min: -6.5
position_endstop: -6.5
position_max: 235
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: false

[stepper_y]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB5
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: PB8
position_min: -2
position_endstop: -2
position_max: 235
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: false

[stepper_z]
step_pin: PC10
dir_pin: !PA15
enable_pin: !PC11
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_max: 225
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PB9
run_current: 0.8
interpolate: True
# Stealthchop for quiet; switch to spreadcycle after ADXL if needed for speed
stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: PD2
run_current: 0.8
interpolate: True
stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: PC5
run_current: 0.8
interpolate: True

[extruder]
step_pin: PA5
dir_pin: !PA6
enable_pin: !PA4
microsteps: 16
rotation_distance: 28.888
gear_ratio: 52:10
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: 0
max_temp: 300
heater_pin: PA7
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA1
max_power: 1
control: pid
pid_kp: 14.722
pid_ki: 0.465
pid_kd: 116.486
pressure_advance: 0.030
pressure_advance_smooth_time: 0.02
max_extrude_cross_section: 5
instantaneous_corner_velocity: 5.0
max_extrude_only_distance: 100
max_extrude_only_velocity: 45
max_extrude_only_accel: 2000
step_pulse_duration: 0.000002

[tmc2209 extruder]
uart_pin: PC4
run_current: 0.9
interpolate: false

[heater_bed]
heater_pin: PB10
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA0
max_power: 1.0
control: pid
pid_kp: 68.601
pid_ki: 1.550
pid_kd: 758.895
min_temp: 0
max_temp: 120
pwm_cycle_time: 0.3

[heater_generic heater_bed_outer]
heater_pin: PC8
max_power: 1.0
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PC2
control: pid
pid_kp: 75.301
pid_ki: 1.383
pid_kd: 1025.032
min_temp: 0
max_temp: 120
pwm_cycle_time: 0.3

[probe]
pin: ^PA11
x_offset: -24.25
y_offset: 20.45
# z_offset must be calibrated on machine; placeholder from recovery config
z_offset: 1.275
speed: 6.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.025
samples_tolerance_retries: 3

[safe_z_home]
home_xy_position: 112.5, 112.5
speed: 100
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 150
horizontal_move_z: 5
mesh_min: 10, 21
mesh_max: 200, 204
probe_count: 7, 7
algorithm: bicubic
bicubic_tension: 0.2
mesh_pps: 2, 2
fade_start: 1.0
fade_end: 10.0

[output_pin Frame_Light]
pin: PB7

[output_pin Part_Light]
pin: PC7

[fan]
pin: PC9

[controller_fan heatbreak+mainboard_fan]
pin: PA8
fan_speed: 1.0
idle_speed: 0.5
idle_timeout: 43200
shutdown_speed: 1
heater: extruder, heater_bed, heater_bed_outer
stepper: stepper_x, stepper_y, stepper_z, extruder

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]
[display_status]
[respond]
[exclude_object]

# Optional ADXL — enable after hardware install
# [adxl345]
# cs_pin: ...
# [resonance_tester]
# accel_chip: adxl345
# probe_points: 112.5, 112.5, 20
