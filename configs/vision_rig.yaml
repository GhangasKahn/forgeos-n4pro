# Optional Jetson vision rig — cameras later. Zero-vision adaptive is primary.

printer:
  moonraker_url: "http://192.168.1.178:7125"
  name: "neptune4pro-znp-k1"

jetson:
  host_role: "vision_brain"
  data_dir: "/data/forgeos/vision"
  ring_buffer_seconds: 5

cameras:
  cam_chamber:
    enabled: false
    device: "/dev/video0"
    role: chamber
  cam_nozzle:
    enabled: false
    device: "/dev/video2"
    role: nozzle

thermal:
  ir_bed:
    enabled: false
    type: mlx90640

realtime:
  enabled: true
  interval_s: 0.25
  alpha: 0.30
  min_apply_interval_s: 1.5
  journal: true
  sources:
    telemetry: true
    cameras: false
    thermal: false
  control:
    flat_surface_mode: true
    z_babystep: true
    flow_m221: true
    speed_m220: true
    pressure_advance: false
  objectives:
    flatness: 0.40
    adhesion_z: 0.30
    thermal: 0.20
    speed: 0.10
  zero_ironing: true
  machine_flat_geometry:
    line_w_mm: 0.44
    spacing_ratio: 1.00
    flow: 1.00

policy:
  auto_apply: false
  max_baby_step_mm: 0.02
  max_total_z_adjust_mm: 0.15
  suggest_only_default: true
