# Zero-vision adaptive process intelligence
# No cameras. Moonraker telemetry + physics only.

enabled: true
moonraker_url: "http://192.168.1.178:7125"
interval_s: 0.5
auto_apply: false   # set true or pass --arm after shop validation

baselines:
  bed_c: 65.0
  nozzle_c: 214.0
  z_adjust_mm: -0.480
  flow: 1.00
  pressure_advance: 0.032
  line_w_mm: 0.44
  spacing_ratio: 1.00

dual_bed:
  enabled: true
  outer_bias_seed_c: 1.0      # cold basement: outer often needs more power
  hold_band_c: 0.8
  max_zone_delta_c: 4.0
  max_step_c: 0.5
  min_adjust_interval_s: 8.0

nozzle:
  enabled: true
  hold_band_c: 2.0
  max_step_c: 2.0
  min_c: 200
  max_c: 230
  moisture_speed_derate: true

flat_surface:
  enabled: true
  zero_ironing: true
  roles: [first, solid, top]

pressure_advance:
  enabled: true
  restore_if_drift: true

flow:
  enabled: true
  min: 0.92
  max: 1.08
  # only nudge from volume residual — never pile-up spacing

objectives:  # weights for precision_belief score
  bed_uniform: 0.30
  nozzle_track: 0.30
  flat_volume: 0.25
  dry_filament: 0.15

safety:
  bed_max_c: 72
  nozzle_max_c: 230
  min_apply_interval_s: 2.0
