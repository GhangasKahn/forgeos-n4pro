# ForgeOS saved shop state — restore after reboot / new session
# Zero-trust: G3 is NOT passed. Historical range 99–100 mm = CNC FAIL until mean remeasure.
# Date: 2026-07-15 (ledger corrected)

version: 3
name: shop_n4pro_pex_brozzl_htpla
description: >
  First-layer Z locked at -0.480 mm on Wham Bam PEX + Brozzl plated copper.
  Machine-flat geometry (spacing=line_w, flow=1.0). G3 CNC pending single mean.

printer:
  host: "192.168.1.178"
  hostname: "znp-k1"
  ssh: "mks@192.168.1.178"
  moonraker: "http://192.168.1.178:7125"
  mainsail: "http://192.168.1.178:81/"
  user: mks

hardware:
  surface: whambam_pex
  nozzle:
    brand: Brozzl
    type: plated_copper
    diameter_mm: 0.4
    product_url: "https://www.brozzl.com/products/plated-copper-nozzles/"
    forge_token: brozzl_plated_copper
  filament:
    brand: Protopasta
    sku: protopasta_htpla
    abrasive: false

process:
  z_adjust_mm: -0.480
  bed_c: 65.0
  nozzle_c: 214.0
  soak_min: 5.0
  ambient_c: 14.0
  ambient_rh: 65.0
  enclosure: open
  draft: 0.3
  pressure_advance: 0.030
  pressure_advance_smooth_time: 0.03
  retract_mm: 1.20
  retract_speed_mm_s: 40
  wipe_mm: 1.4
  z_hop_mm: 0.25
  first_layer:
    # MACHINE-FLAT zero iron — not pile-up pack
    height_mm: 0.28
    line_width_mm: 0.44
    flow: 1.00
    speed_mm_s: 18.0
    fan_percent: 0
    spacing_ratio: 1.00
  purge: true

gates:
  precision_tier: cnc
  g0: pass
  g1: unknown_offline  # requires live Moonraker from this host
  g2: unknown_offline
  g3: fail_pending_mean  # range 99–100 mm → worst |err| 1.0 mm vs CNC 0.10
  g3_evidence: artifacts/g3_measure_20260714.json
  g4: not_run
  g5: not_run

files:
  g3_bar_gcode: generate via scripts/generate_g3_bar_gcode.py --use-stack
  measure_card: artifacts/g3_measure_20260714.json
  stack_doc: docs/STACK_PEX_BROZZL_PROTOPASTA.md

active_job_at_save:
  phase: g3_cnc_fail_pending_remeasure
  note: "Zero-trust: provisional_borderline killed. Need caliper mean ≤100±0.10 mm."

restore_gcode: |
  FORGE_SET_SURFACE TYPE=pex NAME="WhamBam PEX"
  FORGE_SET_NOZZLE TYPE=brozzl_plated_copper DIA=0.4
  FORGE_SET_MATERIAL SKU=protopasta_htpla
  FORGE_SET_Z_ADJUST Z=-0.480
  FORGE_APPLY_ENV_TARGETS BED=65 NOZ=214 SOAK=5
  FORGE_SET_RETRACT LENGTH=1.20 SPEED=40 WIPE=1.4 ZHOP=0.25
  FORGE_SET_PA PA=0.030 SMOOTH=0.03
  FORGE_PREFLIGHT
  FORGE_Z_STATUS

notes:
  - "Z locked -0.480 mm — do not reset without re-tune"
  - "G3 2026-07-14 X=99–100 mm → CNC FAIL until single mean"
  - "T0 print≈21.6 min (historical)"
  - "Cloud agent cannot SSH: TCP SYN then RST on :22/:81/:7125 — need LAN Mac or tunnel"
