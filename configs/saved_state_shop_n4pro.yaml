# ForgeOS saved shop state — restore after reboot / new session
# Snapshot: machine-flat Phase 2 baseline
# Updated: 2026-07-15

version: 3
name: shop_n4pro_pex_brozzl_htpla
description: >
  Machine-flat first-layer baseline on Wham Bam PEX.
  Operator locked Z adjust = -0.480 mm (homing_origin Z).
  Purge macro active. Measured Z is retained; all other process seeds match
  the current material stack and still require physical calibration evidence.

printer:
  host: "192.168.1.178"
  hostname: "znp-k1"
  ssh: "mks@192.168.1.178"
  moonraker: "http://192.168.1.178:7125"
  mainsail: "http://192.168.1.178:81/"
  user: mks

hardware:
  surface: whambam_pex
  nozzle:
    brand: Brozzl
    type: plated_copper
    diameter_mm: 0.4
    product_url: "https://www.brozzl.com/products/plated-copper-nozzles/"
    forge_token: brozzl_plated_copper
  filament:
    brand: Protopasta
    sku: protopasta_htpla
    abrasive: false

process:
  z_adjust_mm: -0.480        # LOCKED 2026-07-14 — do not reset without re-tune
  bed_c: 65.0
  nozzle_c: 214.0
  soak_min: 5.0
  ambient_c: 14.0
  ambient_rh: 65.0
  enclosure: open
  draft: 0.3
  pressure_advance: 0.032
  pressure_advance_smooth_time: 0.03
  retract_mm: 1.15
  retract_speed_mm_s: 40
  wipe_mm: 1.4
  z_hop_mm: 0.25
  first_layer:
    height_mm: 0.28
    line_width_mm: 0.44
    flow: 1.00
    speed_mm_s: 30.0
    fan_percent: 0
    spacing_ratio: 1.00
  purge: true                # FORGE_PURGE in PRINT_START_ENV

files:
  z_tune_gcode: forgeos_z_tune_square.gcode
  g3_bar_gcode: forgeos_g3_phase2.gcode
  measure_card: artifacts/PHASE1_ACCEPTANCE_MEASURE.md
  bom_vision: docs/BOM_GOD_TIER_VISION_RIG.md
  stack_doc: docs/STACK_PEX_BROZZL_PROTOPASTA.md

active_job_at_save:
  filename: null
  phase: phase2_recalibration_required
  note: "Old pile-up G3 result is historical and cannot validate the machine-flat profile."

restore_gcode: |
  FORGE_SET_SURFACE TYPE=pex NAME="WhamBam PEX"
  FORGE_SET_NOZZLE TYPE=brozzl_plated_copper DIA=0.4
  FORGE_SET_MATERIAL SKU=protopasta_htpla
  FORGE_SET_Z_ADJUST Z=-0.480
  FORGE_APPLY_ENV_TARGETS BED=65 NOZ=214 SOAK=5
  FORGE_SET_RETRACT LENGTH=1.15 SPEED=40 WIPE=1.4 ZHOP=0.25
  FORGE_SET_PA PA=0.032 SMOOTH=0.03
  FORGE_PREFLIGHT
  FORGE_Z_STATUS

notes:
  - "Z history: -0.10 empty/scrape → +0.08 ribs → +1.08 float → ~0.90 trial → LOCKED -0.480 (in-print adjust)"
  - "Pile-up geometry 0.58/1.14/0.84 is retired; do not reuse its G3 result."
  - "Run scripts/calibrate.py plan and collect evidence before profile promotion."
  - "PA and retraction are safe seeds, not universal calibrated values."
